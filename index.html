<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>💣 MINE SWEEPER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1f2937;
  --border: #374151;
  --accent: #f59e0b;
  --accent2: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --text: #f9fafb;
  --muted: #6b7280;
  --gold: #fbbf24;
  --silver: #9ca3af;
  --bronze: #d97706;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html,body { width:100%; background:var(--bg); color:var(--text); font-family:'M PLUS Rounded 1c',sans-serif; touch-action:manipulation; overflow-x:hidden; min-height:100vh; }
body { display:flex; flex-direction:column; align-items:center; }

/* ── ヘッダー ── */
header { width:100%; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20; }
.header-top { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 6px; }
.logo { font-family:'Orbitron',monospace; font-size:16px; font-weight:900; letter-spacing:3px; color:var(--accent); text-shadow:0 0 20px rgba(245,158,11,0.5); }
.mascot-wrap { position:relative; width:52px; height:52px; flex-shrink:0; }
.mascot { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); box-shadow:0 0 12px rgba(245,158,11,0.4); transition:transform 0.2s; }
.mascot.celebrate { animation:celebrate 0.4s ease infinite alternate; }
.mascot.scared { filter:hue-rotate(30deg); animation:shake 0.1s linear infinite; }
@keyframes celebrate { from{transform:scale(1) rotate(-5deg);} to{transform:scale(1.15) rotate(5deg);} }
@keyframes shake { from{transform:translateX(-3px);} to{transform:translateX(3px);} }

/* ── 難易度 ── */
.difficulty { display:flex; gap:6px; padding:0 16px 10px; }
.diff-btn { flex:1; padding:8px 4px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-family:'M PLUS Rounded 1c',sans-serif; font-size:12px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; transition:all 0.15s; }
.diff-btn span { font-size:10px; font-weight:400; color:var(--muted); }
.diff-btn.active { background:#1c1400; border-color:var(--accent); color:var(--accent); }
.diff-btn:active { transform:scale(0.95); }

/* ── ステータス ── */
.status-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:0 16px 10px; }
.stat { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:8px 12px; display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; }
.stat-label { font-size:9px; font-weight:700; letter-spacing:1px; color:var(--muted); font-family:'Orbitron',monospace; }
.stat-value { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; line-height:1; }
#mine-stat .stat-value { color:var(--red); }
#timer-stat .stat-value { color:var(--blue); }
#score-stat .stat-value { color:var(--accent); }
#reset-btn { width:52px; height:52px; background:var(--surface2); border:1px solid var(--border); border-radius:50%; font-size:24px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
#reset-btn:active { transform:scale(0.9); }

/* ── メッセージ ── */
#message { text-align:center; font-size:13px; font-weight:700; min-height:18px; padding:0 16px 6px; color:var(--muted); letter-spacing:0.5px; }
#message.win { color:var(--accent2); }
#message.lose { color:var(--red); }

/* ── ボード ── */
main { width:100%; display:flex; justify-content:center; padding:12px 10px 0; overflow-x:auto; }
#board { display:grid; gap:2px; border:1px solid var(--border); border-radius:12px; padding:8px; background:var(--surface); }
.cell { display:flex; align-items:center; justify-content:center; font-family:'Orbitron',monospace; font-weight:700; border-radius:6px; cursor:pointer; background:var(--surface2); border:1px solid var(--border); transition:background 0.08s, transform 0.08s; position:relative; overflow:hidden; }
.cell::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%); pointer-events:none; }
.cell:not(.revealed):active { transform:scale(0.85); }
.cell.revealed { background:var(--bg); border-color:#21262d; cursor:default; }
.cell.revealed::before { display:none; }
.cell.flagged { background:#1c0a00; border-color:var(--accent); }
.cell.mine-boom { background:#3d0f0f; border-color:var(--red); animation:boom 0.25s ease; }
.cell.mine-show { background:#1a0a0a; border-color:#ef444455; }
@keyframes boom { 0%{transform:scale(1.4);} 100%{transform:scale(1);} }
@keyframes pop-in { 0%{transform:scale(0.5);opacity:0;} 60%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
.cell.pop { animation:pop-in 0.15s ease forwards; }
.n1{color:#60a5fa;} .n2{color:#34d399;} .n3{color:#f87171;} .n4{color:#a78bfa;} .n5{color:#fb923c;} .n6{color:#67e8f9;} .n7{color:#f9fafb;} .n8{color:#6b7280;}
.press-ring { position:absolute; inset:0; border-radius:inherit; border:3px solid transparent; pointer-events:none; }
.cell.pressing .press-ring { border-color:var(--accent); animation:ring-grow 0.5s linear forwards; }
@keyframes ring-grow { from{opacity:0.3;} to{opacity:1;} }

/* ── ランキングパネル ── */
.ranking-panel { width:100%; max-width:420px; margin:12px 0; padding:0 12px 16px; }
.rank-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.rank-title { font-family:'Orbitron',monospace; font-size:12px; letter-spacing:2px; color:var(--accent); }
.rank-tabs { display:flex; gap:4px; }
.rank-tab { padding:4px 10px; border-radius:6px; font-size:11px; font-weight:700; border:1px solid var(--border); background:var(--surface2); color:var(--muted); cursor:pointer; }
.rank-tab.active { background:#1c1400; border-color:var(--accent); color:var(--accent); }
.rank-list { display:flex; flex-direction:column; gap:4px; }
.rank-item { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 12px; }
.rank-pos { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; width:20px; text-align:center; }
.rank-pos.gold { color:var(--gold); }
.rank-pos.silver { color:var(--silver); }
.rank-pos.bronze { color:var(--bronze); }
.rank-pos.other { color:var(--muted); }
.rank-info { flex:1; }
.rank-date { font-size:10px; color:var(--muted); }
.rank-score { font-family:'Orbitron',monospace; font-size:16px; font-weight:700; color:var(--accent); }
.rank-detail { font-size:10px; color:var(--muted); }
.rank-empty { text-align:center; color:var(--muted); font-size:12px; padding:20px; }

/* ── ヒント ── */
.hint { text-align:center; font-size:11px; color:var(--muted); padding:8px 0 16px; display:flex; gap:16px; justify-content:center; }
.hint-item { display:flex; align-items:center; gap:6px; }
.hint-badge { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:11px; }

/* ── スコアアップアニメ ── */
.score-popup { position:fixed; pointer-events:none; font-family:'Orbitron',monospace; font-size:18px; font-weight:900; color:var(--accent); text-shadow:0 2px 8px rgba(0,0,0,0.8); animation:score-fly 1.2s ease forwards; z-index:100; }
@keyframes score-fly { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-60px) scale(1.4);} }

/* スキャンライン */
body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px); pointer-events:none; z-index:200; }
</style>
</head>

<script>
// ── 設定 ──
const LEVELS = {
  easy:   { rows:9,  cols:9,  mines:10,  baseScore:1000 },
  medium: { rows:12, cols:12, mines:25,  baseScore:3000 },
  hard:   { rows:15, cols:15, mines:45,  baseScore:8000 },
};

// ── 状態 ──
let cfg=LEVELS.easy, levelKey='easy';
let board,revealed,flagged;
let gameOver,started;
let timerSec,timerInterval;
let score=0;
let longPressTimer=null;
let rankings = { easy:[], medium:[], hard:[] };
let currentRankTab = 'easy';

// ── ランキングをlocalStorageから復元（iOS SafariはローカルファイルでNG→インメモリのみ） ──
function loadRankings() {
  try {
    const saved = localStorage.getItem('ms_rankings');
    if(saved) rankings = JSON.parse(saved);
  } catch(e) {}
}
function saveRankings() {
  try { localStorage.setItem('ms_rankings', JSON.stringify(rankings)); } catch(e) {}
}
loadRankings();

// ── スコア計算 ──
function calcScore(timeElapsed) {
  const base = cfg.baseScore;
  const timeBonus = Math.max(0, 300 - timeElapsed) * 10;
  return Math.round(base + timeBonus);
}

// ── マスコット ──
function mascotState(state) {
  const m = document.getElementById('mascot');
  m.className = 'mascot';
  if(state==='win') m.classList.add('celebrate');
  else if(state==='lose') m.classList.add('scared');
}

// ── セルサイズ ──
function calcCellSize() {
  const avail = Math.min(window.innerWidth - 32, 480);
  const s = Math.floor((avail - cfg.cols*2 - 18) / cfg.cols);
  return Math.max(26, Math.min(44, s));
}

// ── 初期化 ──
function init() {
  clearInterval(timerInterval);
  timerSec=0; started=false; gameOver=false; score=0;
  board    = Array.from({length:cfg.rows},()=>Array(cfg.cols).fill(0));
  revealed = Array.from({length:cfg.rows},()=>Array(cfg.cols).fill(false));
  flagged  = Array.from({length:cfg.rows},()=>Array(cfg.cols).fill(false));
  document.getElementById('timer').textContent='0';
  document.getElementById('mine-count').textContent=cfg.mines;
  document.getElementById('score-disp').textContent='0';
  document.getElementById('reset-btn').textContent='🙂';
  const msg=document.getElementById('message');
  msg.textContent='タップして開始！'; msg.className='';
  mascotState('normal');
  renderBoard();
}

// ── 地雷配置 ──
function placeMines(skipR,skipC) {
  let p=0;
  while(p<cfg.mines){
    const r=Math.floor(Math.random()*cfg.rows),c=Math.floor(Math.random()*cfg.cols);
    if(board[r][c]===-1) continue;
    if(Math.abs(r-skipR)<=1&&Math.abs(c-skipC)<=1) continue;
    board[r][c]=-1; p++;
  }
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++) {
    if(board[r][c]===-1) continue;
    let n=0;
    neighbors(r,c).forEach(([nr,nc])=>{ if(board[nr][nc]===-1) n++; });
    board[r][c]=n;
  }
}
function neighbors(r,c) {
  const res=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
    if(!dr&&!dc) continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<cfg.rows&&nc>=0&&nc<cfg.cols) res.push([nr,nc]);
  }
  return res;
}

// ── フラッドフィル ──
function floodReveal(r,c) {
  if(r<0||r>=cfg.rows||c<0||c>=cfg.cols||revealed[r][c]||flagged[r][c]) return;
  revealed[r][c]=true;
  if(board[r][c]===0) neighbors(r,c).forEach(([nr,nc])=>floodReveal(nr,nc));
}

// ── タイマー ──
function startTimer() {
  timerInterval=setInterval(()=>{
    timerSec=Math.min(timerSec+1,999);
    document.getElementById('timer').textContent=timerSec;
  },1000);
}

// ── 旗数 ──
function countFlags() {
  let n=0; flagged.forEach(row=>row.forEach(f=>{ if(f)n++; })); return n;
}

// ── 勝利判定 ──
function checkWin() {
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++)
    if(board[r][c]!==-1&&!revealed[r][c]) return false;
  return true;
}

// ── スコアポップアップ ──
function showScorePopup(pts, el) {
  const rect = el.getBoundingClientRect();
  const div = document.createElement('div');
  div.className = 'score-popup';
  div.textContent = '+'+pts;
  div.style.left = rect.left + rect.width/2 - 30 + 'px';
  div.style.top = rect.top - 10 + 'px';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(), 1200);
}

// ── セルを開く ──
function handleOpen(r,c) {
  if(gameOver||flagged[r][c]||revealed[r][c]) return;
  if(!started) {
    started=true; placeMines(r,c); startTimer();
  }
  if(board[r][c]===-1) {
    revealed[r][c]=true; gameOver=true;
    clearInterval(timerInterval);
    document.getElementById('reset-btn').textContent='😵';
    const msg=document.getElementById('message');
    msg.textContent=`💥 やられた！ (${timerSec}秒)`;
    msg.className='lose';
    mascotState('lose');
    // 全地雷表示
    for(let rr=0;rr<cfg.rows;rr++) for(let cc=0;cc<cfg.cols;cc++) if(board[rr][cc]===-1) revealed[rr][cc]=true;
    renderBoard();
    return;
  }
  const before = countRevealed();
  floodReveal(r,c);
  const after = countRevealed();
  const opened = after - before;

  // スコア加算
  const pts = opened * 10;
  score += pts;
  document.getElementById('score-disp').textContent=score;

  // ポップアップ表示
  const cellEl = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(cellEl && pts>0) showScorePopup(pts, cellEl);

  renderBoard();

  if(checkWin()) {
    gameOver=true; clearInterval(timerInterval);
    const finalScore = score + calcScore(timerSec);
    score = finalScore;
    document.getElementById('score-disp').textContent=score;
    document.getElementById('reset-btn').textContent='😎';
    const msg=document.getElementById('message');
    msg.textContent=`🎉 クリア！ スコア: ${score}`;
    msg.className='win';
    mascotState('win');
    // 全旗立て
    for(let rr=0;rr<cfg.rows;rr++) for(let cc=0;cc<cfg.cols;cc++) if(board[rr][cc]===-1) flagged[rr][cc]=true;
    document.getElementById('mine-count').textContent=0;
    renderBoard();
    // ランキング登録
    addRanking(levelKey, score, timerSec);
  }
}

function countRevealed() {
  let n=0; revealed.forEach(row=>row.forEach(v=>{ if(v)n++; })); return n;
}

// ── 旗操作 ──
function handleFlag(r,c) {
  if(gameOver||revealed[r][c]) return;
  flagged[r][c]=!flagged[r][c];
  document.getElementById('mine-count').textContent=cfg.mines-countFlags();
  const cellEl=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(cellEl) updateCell(cellEl,r,c);
}

// ── ランキング登録 ──
function addRanking(diff, sc, time) {
  const entry = { score:sc, time, date:new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) };
  rankings[diff].push(entry);
  rankings[diff].sort((a,b)=>b.score-a.score);
  rankings[diff] = rankings[diff].slice(0,5);
  saveRankings();
  renderRanking();
}

// ── ランキング描画 ──
function renderRanking() {
  const list = document.getElementById('rank-list');
  const data = rankings[currentRankTab];
  if(!data||!data.length) {
    list.innerHTML='<div class="rank-empty">まだ記録なし</div>'; return;
  }
  list.innerHTML = data.map((e,i)=>{
    const posClass = i===0?'gold':i===1?'silver':i===2?'bronze':'other';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    return `<div class="rank-item">
      <div class="rank-pos ${posClass}">${medal}</div>
      <div class="rank-info">
        <div class="rank-date">${e.date} (${e.time}秒)</div>
        <div class="rank-score">${e.score.toLocaleString()}</div>
      </div>
    </div>`;
  }).join('');
}

// ── ボード描画 ──
function renderBoard(boomR,boomC) {
  const size=calcCellSize();
  document.documentElement.style.setProperty('--cs',size+'px');
  const boardEl=document.getElementById('board');
  boardEl.style.gridTemplateColumns=`repeat(${cfg.cols},${size}px)`;
  boardEl.innerHTML='';
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++) {
    const cell=document.createElement('div');
    cell.className='cell'; cell.dataset.r=r; cell.dataset.c=c;
    cell.style.width=size+'px'; cell.style.height=size+'px';
    cell.style.fontSize=Math.max(9,size-18)+'px';
    cell.innerHTML='<div class="press-ring"></div>';
    updateCell(cell,r,c,boomR,boomC);
    attachEvents(cell,r,c);
    boardEl.appendChild(cell);
  }
}

function updateCell(cell,r,c,boomR,boomC) {
  const isMine=board[r][c]===-1, isRev=revealed[r][c], isFlag=flagged[r][c];
  cell.classList.remove('revealed','flagged','mine-boom','mine-show','pop');
  for(let i=1;i<=8;i++) cell.classList.remove('n'+i);
  const ring=cell.querySelector('.press-ring');
  cell.textContent=''; cell.appendChild(ring);
  if(isRev) {
    cell.classList.add('revealed');
    if(isMine) {
      cell.classList.add(boomR===r&&boomC===c?'mine-boom':'mine-show');
      cell.append('💣');
    } else if(board[r][c]>0) {
      cell.classList.add('n'+board[r][c]);
      cell.append(board[r][c]);
      cell.classList.add('pop');
    }
  } else if(isFlag) { cell.classList.add('flagged'); cell.append('🚩'); }
}

// ── イベント ──
function attachEvents(cell,r,c) {
  cell.addEventListener('click',e=>{ e.preventDefault(); handleOpen(r,c); });
  cell.addEventListener('contextmenu',e=>{ e.preventDefault(); handleFlag(r,c); });
  cell.addEventListener('touchstart',()=>{
    longPressTimer=setTimeout(()=>{ longPressTimer=null; cell.classList.remove('pressing'); handleFlag(r,c); },500);
    cell.classList.add('pressing');
  },{passive:true});
  cell.addEventListener('touchend',()=>{
    if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer=null; cell.classList.remove('pressing'); handleOpen(r,c); }
  });
  cell.addEventListener('touchmove',()=>{ if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;cell.classList.remove('pressing');} },{passive:true});
  cell.addEventListener('touchcancel',()=>{ if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;cell.classList.remove('pressing');} });
}

// ── 難易度ボタン ──
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    levelKey=btn.dataset.level; cfg=LEVELS[levelKey];
    // ランキングタブも連動
    document.querySelectorAll('.rank-tab').forEach(t=>{ t.classList.toggle('active',t.dataset.diff===levelKey); });
    currentRankTab=levelKey; renderRanking();
    init();
  });
});

// ── ランキングタブ ──
document.querySelectorAll('.rank-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.rank-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active'); currentRankTab=tab.dataset.diff; renderRanking();
  });
});

// ── リセット ──
document.getElementById('reset-btn').addEventListener('click',init);

// ── リサイズ ──
window.addEventListener('resize',()=>{
  const size=calcCellSize();
  document.getElementById('board').style.gridTemplateColumns=`repeat(${cfg.cols},${size}px)`;
  document.querySelectorAll('.cell').forEach(c=>{ c.style.width=size+'px'; c.style.height=size+'px'; c.style.fontSize=Math.max(9,size-18)+'px'; });
});

// ── 起動 ──
init();
renderRanking();
</script>
</body>
</html>
